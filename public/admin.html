<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex,nofollow">
  <title>站点后台配置</title>
  <link rel="stylesheet" href="/assets/admin.css?v=20260701-3">
</head>
<body>
  <main class="admin-shell">
    <section id="loginPanel" class="panel narrow-panel" aria-labelledby="loginTitle">
      <div class="panel-heading">
        <div>
          <h1 id="loginTitle">后台登录</h1>
        </div>
        <a class="home-link" href="/">查看首页</a>
      </div>

      <form id="loginForm" class="config-form">
        <label>
          <span>管理密码</span>
          <input id="loginPassword" name="password" type="password" autocomplete="current-password" placeholder="请输入管理密码" required>
        </label>

        <div class="actions">
          <button id="loginBtn" class="primary-btn" type="submit">登录</button>
        </div>
      </form>

      <p id="loginStatus" class="status" role="status" aria-live="polite"></p>
    </section>

    <section id="configPanel" class="panel is-hidden" aria-labelledby="adminTitle">
      <div class="panel-heading">
        <div>
          <h1 id="adminTitle">站点配置</h1>
        </div>
        <a class="home-link" href="/">查看首页</a>
      </div>

      <form id="configForm" class="config-form">
        <label>
          <span>客服 ID</span>
          <input id="customerServiceId" name="customerServiceId" type="text" inputmode="numeric" placeholder="2379548014" required>
        </label>

        <div class="button-config-grid">
          <section class="field-group" aria-labelledby="topLeftButtonTitle">
            <h2 id="topLeftButtonTitle">右上角按钮左</h2>
            <label>
              <span>按钮文字</span>
              <input id="topLeftButtonText" name="topLeftButtonText" type="text" maxlength="24" placeholder="泡泡下载" required>
            </label>
            <label>
              <span>按钮链接</span>
              <input id="topLeftButtonUrl" name="topLeftButtonUrl" type="url" placeholder="https://www.paopaomiyu.xyz/" required>
            </label>
          </section>

          <section class="field-group" aria-labelledby="topRightButtonTitle">
            <h2 id="topRightButtonTitle">右上角按钮右</h2>
            <label>
              <span>按钮文字</span>
              <input id="topRightButtonText" name="topRightButtonText" type="text" maxlength="24" placeholder="游戏娱乐" required>
            </label>
            <label>
              <span>按钮链接</span>
              <input id="topRightButtonUrl" name="topRightButtonUrl" type="url" placeholder="https://h5.cggames.top/#/Main/home" required>
            </label>
          </section>

          <section class="field-group" aria-labelledby="middleLeftButtonTitle">
            <h2 id="middleLeftButtonTitle">中间按钮左</h2>
            <label>
              <span>按钮文字</span>
              <input id="middleLeftButtonText" name="middleLeftButtonText" type="text" maxlength="24" placeholder="EG/CG币出售" required>
            </label>
            <label>
              <span>按钮链接</span>
              <input id="middleLeftButtonUrl" name="middleLeftButtonUrl" type="url" placeholder="https://www.paopaomiyu.xyz/" required>
            </label>
          </section>

          <section class="field-group" aria-labelledby="middleRightButtonTitle">
            <h2 id="middleRightButtonTitle">中间按钮右</h2>
            <label>
              <span>按钮文字</span>
              <input id="middleRightButtonText" name="middleRightButtonText" type="text" maxlength="24" placeholder="账户报白" required>
            </label>
            <label>
              <span>按钮链接</span>
              <input id="middleRightButtonUrl" name="middleRightButtonUrl" type="url" placeholder="https://www.paopaomiyu.xyz/" required>
            </label>
          </section>
        </div>

        <div class="actions">
          <button id="loadBtn" class="secondary-btn" type="button">读取当前配置</button>
          <button id="saveBtn" class="primary-btn" type="submit">保存配置</button>
        </div>
      </form>

      <p id="statusMessage" class="status" role="status" aria-live="polite"></p>

      <form id="passwordForm" class="config-form password-form" aria-labelledby="passwordTitle">
        <h2 id="passwordTitle">修改管理员密码</h2>

        <label>
          <span>新管理员密码</span>
          <input id="newAdminPassword" name="newAdminPassword" type="password" autocomplete="new-password" minlength="6" maxlength="128" placeholder="至少 6 位" required>
        </label>

        <label>
          <span>确认新密码</span>
          <input id="confirmAdminPassword" name="confirmAdminPassword" type="password" autocomplete="new-password" minlength="6" maxlength="128" placeholder="再次输入新密码" required>
        </label>

        <div class="actions">
          <button id="passwordBtn" class="secondary-btn" type="submit">修改密码</button>
        </div>
      </form>

      <p id="passwordStatus" class="status" role="status" aria-live="polite"></p>
    </section>
  </main>

  <script src="/assets/admin.js?v=20260701-3" defer></script>
</body>
</html>
